name: Update WA Web Version

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    name: Fetch & Update WA Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch latest WA Web version
        id: fetch
        run: |
          VERSION=$(node -e "
            const https = require('https');
            const url = 'https://web.whatsapp.com/check-update?version=1&platform=web';
            https.get(url, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  const json = JSON.parse(data);
                  const ver = json.currentVersion;
                  if (ver) process.stdout.write(ver);
                  else process.exit(1);
                } catch { process.exit(1); }
              });
            }).on('error', () => process.exit(1));
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Fetched version: $VERSION"

      - name: Read current version from Defaults
        id: current
        run: |
          CURRENT=$(node -e "
            const fs = require('fs');
            const content = fs.readFileSync('lib/Defaults/index.js', 'utf8');
            const match = content.match(/export const version = \[([^\]]+)\]/);
            if (match) process.stdout.write(match[1].replace(/\s/g,''));
          ")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Compare & update if changed
        id: update
        run: |
          NEW="${{ steps.fetch.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"

          NEW_ARRAY=$(echo "$NEW" | sed 's/\./,/g')
          CURRENT_ARRAY=$(echo "$CURRENT" | tr -d ' ')

          echo "New    : [$NEW_ARRAY]"
          echo "Current: [$CURRENT_ARRAY]"

          if [ "[$NEW_ARRAY]" = "[$CURRENT_ARRAY]" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version is already up to date."
          else
            sed -i "s/export const version = \[[^\]]*\]/export const version = [$NEW_ARRAY]/" lib/Defaults/index.js
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW" >> $GITHUB_OUTPUT
            echo "Version updated to $NEW"
          fi

      - name: Bump package.json version patch
        if: steps.update.outputs.changed == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const parts = pkg.version.split('.').map(Number);
            parts[2] += 1;
            pkg.version = parts.join('.');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Bumped to', pkg.version);
          "

      - name: Commit & push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/Defaults/index.js package.json
          git commit -m "chore: update WA Web version to ${{ steps.update.outputs.new_version }}"
          git push
